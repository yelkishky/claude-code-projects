<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EFG Hermes — Tic Tac Toe</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy:   #0B1F4B;
      --navy2:  #112358;
      --navy3:  #1a3272;
      --gold:   #C9A84C;
      --gold2:  #E2C06A;
      --gold3:  #F0D080;
      --white:  #FFFFFF;
      --muted:  #8899BB;
      --bg:     #060F28;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      font-family: 'Inter', 'Segoe UI', sans-serif;
      color: var(--white);
      background-image:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(201,168,76,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 50% 110%, rgba(11,31,75,0.6) 0%, transparent 70%);
    }

    /* ── Header / Logo ── */
    header {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 2rem;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 0.3rem;
    }

    .logo-mark {
      width: 48px;
      height: 48px;
      position: relative;
    }

    .logo-mark svg { width: 100%; height: 100%; }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1;
    }

    .logo-text .efg {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 4px;
    }

    .logo-text .hermes {
      font-size: 0.7rem;
      font-weight: 300;
      color: var(--muted);
      letter-spacing: 6px;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .divider {
      width: 1px;
      height: 40px;
      background: linear-gradient(to bottom, transparent, var(--gold), transparent);
      margin: 0 6px;
    }

    .game-title {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 5px;
      color: var(--muted);
      text-transform: uppercase;
      margin-top: 0.5rem;
    }

    /* ── Status ── */
    #status {
      font-size: 1rem;
      font-weight: 400;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 1.6rem;
      min-height: 1.4em;
      transition: color 0.3s;
    }

    #status.highlight { color: var(--gold2); }

    /* ── Board ── */
    #board-wrap {
      padding: 10px;
      background: linear-gradient(135deg, rgba(201,168,76,0.18), rgba(201,168,76,0.04));
      border-radius: 20px;
      border: 1px solid rgba(201,168,76,0.2);
      box-shadow: 0 0 60px rgba(201,168,76,0.07), 0 20px 60px rgba(0,0,0,0.5);
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: var(--navy);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.6rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, transform 0.12s, box-shadow 0.15s;
      user-select: none;
      border: 1px solid rgba(255,255,255,0.04);
      position: relative;
      overflow: hidden;
    }

    .cell::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.04), transparent);
      border-radius: 12px;
      pointer-events: none;
    }

    .cell:hover:not(.taken) {
      background: var(--navy3);
      transform: scale(1.04);
      box-shadow: 0 0 20px rgba(201,168,76,0.15);
      border-color: rgba(201,168,76,0.25);
    }

    .cell.x {
      color: var(--gold2);
      text-shadow: 0 0 20px rgba(201,168,76,0.4);
    }

    .cell.o {
      color: #7EAADD;
      text-shadow: 0 0 20px rgba(126,170,221,0.4);
    }

    .cell.win {
      background: linear-gradient(135deg, rgba(201,168,76,0.25), rgba(201,168,76,0.08));
      border-color: rgba(201,168,76,0.5);
      box-shadow: 0 0 30px rgba(201,168,76,0.2);
      animation: pulse 0.5s ease-in-out;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    /* ── Scores ── */
    #scores {
      display: flex;
      gap: 1rem;
      margin-top: 1.8rem;
    }

    .score-box {
      text-align: center;
      background: var(--navy);
      border: 1px solid rgba(255,255,255,0.06);
      padding: 0.7rem 1.4rem;
      border-radius: 12px;
      min-width: 80px;
      transition: border-color 0.2s;
    }

    .score-box:hover { border-color: rgba(201,168,76,0.2); }

    .score-box .label {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 2px;
      color: var(--muted);
      margin-bottom: 0.3rem;
      text-transform: uppercase;
    }

    .score-box .val { font-size: 1.8rem; font-weight: 700; }
    .score-box.x-box .val { color: var(--gold2); }
    .score-box.o-box .val { color: #7EAADD; }
    .score-box.d-box .val { color: var(--muted); }

    /* ── Buttons ── */
    .btn-row {
      display: flex;
      gap: 0.75rem;
      margin-top: 1.6rem;
    }

    button {
      padding: 0.6rem 1.6rem;
      font-size: 0.8rem;
      font-family: inherit;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
    }

    #reset {
      background: linear-gradient(135deg, var(--gold), #a8832e);
      color: var(--navy);
      box-shadow: 0 4px 20px rgba(201,168,76,0.25);
    }

    #reset:hover {
      background: linear-gradient(135deg, var(--gold2), var(--gold));
      box-shadow: 0 4px 28px rgba(201,168,76,0.4);
      transform: translateY(-1px);
    }

    #mode-toggle {
      background: var(--navy2);
      color: var(--muted);
      border: 1px solid rgba(255,255,255,0.08);
    }

    #mode-toggle:hover {
      background: var(--navy3);
      color: var(--white);
      border-color: rgba(201,168,76,0.3);
    }

    #mode-toggle.active {
      background: var(--navy3);
      color: var(--gold2);
      border-color: rgba(201,168,76,0.35);
    }

    /* ── Footer ── */
    footer {
      margin-top: 2.5rem;
      font-size: 0.6rem;
      letter-spacing: 2px;
      color: rgba(136,153,187,0.35);
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <!-- EFG Hermes Logomark (stylised H in a shield) -->
      <div class="logo-mark">
        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M24 2 L44 10 L44 28 C44 38 34 45 24 47 C14 45 4 38 4 28 L4 10 Z"
                fill="url(#shield-grad)" stroke="rgba(201,168,76,0.4)" stroke-width="0.8"/>
          <path d="M15 13 L15 35 M33 13 L33 35 M15 24 L33 24"
                stroke="url(#h-grad)" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
          <defs>
            <linearGradient id="shield-grad" x1="4" y1="2" x2="44" y2="47" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#1a3272"/>
              <stop offset="100%" stop-color="#0B1F4B"/>
            </linearGradient>
            <linearGradient id="h-grad" x1="15" y1="13" x2="33" y2="35" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#F0D080"/>
              <stop offset="100%" stop-color="#C9A84C"/>
            </linearGradient>
          </defs>
        </svg>
      </div>

      <div class="divider"></div>

      <div class="logo-text">
        <span class="efg">EFG</span>
        <span class="hermes">Hermes</span>
      </div>
    </div>
    <div class="game-title">Tic &nbsp;·&nbsp; Tac &nbsp;·&nbsp; Toe</div>
  </header>

  <div id="status">Player X's turn</div>

  <div id="board-wrap">
    <div id="board"></div>
  </div>

  <div id="scores">
    <div class="score-box x-box">
      <div class="label">X Wins</div>
      <div class="val" id="score-x">0</div>
    </div>
    <div class="score-box d-box">
      <div class="label">Draws</div>
      <div class="val" id="score-d">0</div>
    </div>
    <div class="score-box o-box">
      <div class="label">O Wins</div>
      <div class="val" id="score-o">0</div>
    </div>
  </div>

  <div class="btn-row">
    <button id="reset">New Game</button>
    <button id="mode-toggle">vs Computer: Off</button>
  </div>

  <footer>EFG Hermes &mdash; Internal &copy; 2026</footer>

  <script>
    const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

    let board, current, gameOver, vsComputer = false;
    let scores = { X: 0, O: 0, D: 0 };

    const cells    = [];
    const boardEl  = document.getElementById('board');
    const statusEl = document.getElementById('status');
    const resetBtn = document.getElementById('reset');
    const modeBtn  = document.getElementById('mode-toggle');

    for (let i = 0; i < 9; i++) {
      const cell = document.createElement('div');
      cell.classList.add('cell');
      cell.addEventListener('click', () => handleClick(i));
      boardEl.appendChild(cell);
      cells.push(cell);
    }

    function startGame() {
      board    = Array(9).fill(null);
      current  = 'X';
      gameOver = false;
      cells.forEach(c => { c.textContent = ''; c.className = 'cell'; });
      setStatus(`Player X's turn`);
    }

    function setStatus(msg, bright = false) {
      statusEl.textContent = msg;
      statusEl.className   = bright ? 'highlight' : '';
    }

    function handleClick(i) {
      if (gameOver || board[i]) return;
      if (vsComputer && current === 'O') return;
      makeMove(i);
      if (vsComputer && !gameOver) setTimeout(computerMove, 380);
    }

    function makeMove(i) {
      board[i] = current;
      cells[i].textContent = current;
      cells[i].classList.add(current.toLowerCase(), 'taken');

      const win = checkWin();
      if (win) {
        win.forEach(idx => cells[idx].classList.add('win'));
        const label = vsComputer && current === 'O' ? 'Computer wins!' : `Player ${current} wins!`;
        setStatus(label, true);
        scores[current]++;
        updateScores();
        gameOver = true;
        return;
      }
      if (board.every(Boolean)) {
        setStatus("It's a draw!", true);
        scores.D++;
        updateScores();
        gameOver = true;
        return;
      }
      current = current === 'X' ? 'O' : 'X';
      if (vsComputer && current === 'O') setStatus('Computer is thinking...');
      else setStatus(`Player ${current}'s turn`);
    }

    function checkWin() {
      for (const [a,b,c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) return [a,b,c];
      }
      return null;
    }

    function computerMove() {
      const move = bestMove();
      if (move !== -1) makeMove(move);
    }

    function bestMove() {
      let best = -Infinity, idx = -1;
      for (let i = 0; i < 9; i++) {
        if (!board[i]) {
          board[i] = 'O';
          const s = minimax(board, 0, false);
          board[i] = null;
          if (s > best) { best = s; idx = i; }
        }
      }
      return idx;
    }

    function minimax(b, depth, isMax) {
      const r = evaluate(b);
      if (r !== null) return r;
      if (isMax) {
        let best = -Infinity;
        for (let i = 0; i < 9; i++) {
          if (!b[i]) { b[i]='O'; best=Math.max(best,minimax(b,depth+1,false)); b[i]=null; }
        }
        return best;
      } else {
        let best = Infinity;
        for (let i = 0; i < 9; i++) {
          if (!b[i]) { b[i]='X'; best=Math.min(best,minimax(b,depth+1,true)); b[i]=null; }
        }
        return best;
      }
    }

    function evaluate(b) {
      for (const [a,c,d] of WINS) {
        if (b[a] && b[a]===b[c] && b[a]===b[d]) return b[a]==='O' ? 10 : -10;
      }
      if (b.every(Boolean)) return 0;
      return null;
    }

    function updateScores() {
      document.getElementById('score-x').textContent = scores.X;
      document.getElementById('score-o').textContent = scores.O;
      document.getElementById('score-d').textContent = scores.D;
    }

    resetBtn.addEventListener('click', startGame);

    modeBtn.addEventListener('click', () => {
      vsComputer = !vsComputer;
      modeBtn.textContent = `vs Computer: ${vsComputer ? 'On' : 'Off'}`;
      modeBtn.classList.toggle('active', vsComputer);
      startGame();
    });

    startGame();
  </script>
</body>
</html>
